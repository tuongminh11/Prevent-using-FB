<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8">
    <style>
        body {
            font-family: Arial;
            width: 250px;
            padding: 10px;
        }

        label {
            display: block;
            margin-top: 10px;
        }

        button {
            margin-top: 15px;
            width: 100%;
        }
    </style>
</head>

<body>

    <h3>Time Limit Settings</h3>

    <form action="">
        <label for="url">URL:</label>
        <input type="text" id="url" name="url" placeholder="Enter URL">

        <label for="time">Time Limit (minutes):</label>
        <input type="number" id="time" name="time" placeholder="Enter time limit">

        <label>
            <input type="radio" name="limit-action" id="block" value="block" checked>
            Prevent Access
        </label>
        <label>
            <input type="radio" name="limit-action" id="warn" value="warn">
            Show Warning
        </label>
        
        <button id="url-save">Save</button>
    </form>


    <script src="background.js"></script>

</body>

</html>
